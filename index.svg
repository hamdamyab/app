<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
    <foreignObject width="100%" height="100%" x="0" y="0">
        <html xmlns="http://www.w3.org/1999/xhtml" style="width: 100%; height: 100%; margin: 0; padding: 0; background-color: #090a0f;">
            <head>
                <meta charset="UTF-8" />
                <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
                <style>
                    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap');

                    /* انتقال اسکرول به داخل بدنه اصلی و حذف کامل حاشیه‌ها */
                    html, body {
                        width: 100%;
                        height: 100%;
                        margin: 0;
                        padding: 0;
                        background-color: transparent;
                        color: #ffffff;
                        font-family: 'Vazirmatn', Tahoma, sans-serif;
                        overflow-y: auto;
                        overflow-x: hidden;
                        direction: rtl;
                        -webkit-overflow-scrolling: touch;
                    }

                    /* افکت‌های نئونی پس‌زمینه */
                    .neon-bg {
                        position: fixed;
                        top: 0; left: 0; width: 100%; height: 100%;
                        z-index: -1;
                        background: 
                            radial-gradient(circle at 10% 20%, rgba(111, 0, 255, 0.25) 0%, transparent 40%),
                            radial-gradient(circle at 90% 80%, rgba(255, 0, 128, 0.2) 0%, transparent 40%),
                            radial-gradient(circle at 50% 50%, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
                    }

                    .main-container {
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        padding: clamp(15px, 4vw, 40px);
                        min-height: 100%;
                        box-sizing: border-box;
                    }

                    /* پنل شیشه‌ای اصلی */
                    .glass-card {
                        width: 100%;
                        max-width: 850px;
                        background: rgba(25, 26, 35, 0.3);
                        backdrop-filter: blur(20px);
                        -webkit-backdrop-filter: blur(20px);
                        border: 1px solid rgba(255, 255, 255, 0.08);
                        border-radius: 35px;
                        padding: clamp(25px, 5vw, 50px);
                        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        text-align: center;
                        margin: 10px 0 40px 0;
                    }

                    .badge {
                        background: rgba(0, 255, 128, 0.15);
                        color: #00ff80;
                        border: 1px solid rgba(0, 255, 128, 0.3);
                        padding: 10px 20px;
                        border-radius: 50px;
                        font-weight: 700;
                        font-size: clamp(0.75rem, 2vw, 0.9rem);
                        margin-bottom: 25px;
                        box-shadow: 0 0 20px rgba(0, 255, 128, 0.2);
                    }

                    .app-icon {
                        width: clamp(90px, 15vw, 120px);
                        height: clamp(90px, 15vw, 120px);
                        background: linear-gradient(135deg, #ff007f 0%, #6f00ff 100%);
                        border-radius: 30px;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        font-size: clamp(2.5rem, 6vw, 3.5rem);
                        margin-bottom: 20px;
                        box-shadow: 0 15px 35px rgba(255, 0, 128, 0.4);
                        border: 2px solid rgba(255, 255, 255, 0.15);
                    }

                    h1 {
                        font-size: clamp(1.3rem, 4vw, 2rem);
                        font-weight: 900;
                        line-height: 1.5;
                        margin-bottom: 15px;
                        color: #ffffff;
                    }

                    .desc {
                        font-size: clamp(0.9rem, 2.5vw, 1.1rem);
                        color: #aeb4c7;
                        line-height: 1.8;
                        margin-bottom: 35px;
                        max-width: 600px;
                    }

                    .download-btn {
                        background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
                        color: #ffffff;
                        text-decoration: none;
                        font-size: clamp(1rem, 3vw, 1.2rem);
                        font-weight: 700;
                        padding: 15px 40px;
                        border-radius: 50px;
                        box-shadow: 0 10px 30px rgba(0, 210, 255, 0.4);
                        margin-bottom: 50px;
                    }

                    /* چیدمان اسکرین‌شات‌ها */
                    .gallery {
                        display: flex;
                        flex-wrap: wrap;
                        justify-content: center;
                        gap: clamp(15px, 3vw, 25px);
                        width: 100%;
                        margin-bottom: 50px;
                    }

                    .mockup {
                        width: clamp(150px, 28vw, 200px);
                        aspect-ratio: 9/19;
                        background: #000;
                        border-radius: 24px;
                        padding: 6px;
                        border: 1px solid rgba(255, 255, 255, 0.15);
                        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
                        position: relative;
                        overflow: hidden;
                    }

                    .screen {
                        width: 100%;
                        height: 100%;
                        border-radius: 18px;
                        background-size: cover;
                        background-position: center;
                        position: relative;
                    }

                    .screen::after {
                        content: '';
                        position: absolute;
                        bottom: 0; left: 0; right: 0; height: 50%;
                        background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
                        border-radius: 0 0 18px 18px;
                    }

                    .screen-text {
                        position: absolute;
                        bottom: 12px;
                        left: 0;
                        right: 0;
                        text-align: center;
                        font-weight: 700;
                        font-size: clamp(0.75rem, 2vw, 0.95rem);
                        z-index: 2;
                    }

                    /* باکس‌های متنی */
                    .faq-wrapper {
                        width: 100%;
                        display: flex;
                        flex-direction: column;
                        gap: 15px;
                        text-align: right;
                    }

                    .faq-box {
                        background: rgba(0, 0, 0, 0.4);
                        border: 1px solid rgba(255, 255, 255, 0.05);
                        border-radius: 20px;
                        padding: clamp(15px, 4vw, 25px);
                    }

                    .faq-title {
                        color: #ff007f;
                        font-size: clamp(1rem, 2.5vw, 1.15rem);
                        font-weight: 700;
                        margin-bottom: 10px;
                    }

                    .faq-text {
                        color: #b0b5c5;
                        font-size: clamp(0.85rem, 2vw, 1rem);
                        line-height: 1.8;
                    }
                </style>
            </head>
            <body>
                <div class="neon-bg"></div>
                
                <div class="main-container">
                    <div class="glass-card">
                        
                        <div class="badge">✓ برنامه کاملا رایگان است - بدون نیاز به پرداخت هیچ مبلغی</div>
                        
                        <div class="app-icon">❤️</div>
                        
                        <h1>🔥 بزرگترین سامانه همدم‌یابی و دوستیابی آنلاین (نسخه جدید) 🔥</h1>
                        
                        <div class="desc">
                            دنبال یک رابطه جدی هستی یا میخوای با آدم‌های جدید تو شهر خودت آشنا بشی؟🥰<br/>
                            اپلیکیشن ما با هزاران کاربر فعال تو سراسر ایران منتظرته! محیطی کاملا امن برای پیدا کردن نیمه گمشده شما.
                        </div>

                        <a href="#" class="download-btn">دانلود مستقیم اپلیکیشن</a>

                        <div class="gallery">
                            <div class="mockup">
                                <div class="screen" style="background-image: url('https://images.unsplash.com/photo-1549282367-17e974e6443c?auto=format&amp;fit=crop&amp;q=80&amp;w=400');">
                                    <div class="screen-text">پروفایل‌های تایید شده</div>
                                </div>
                            </div>
                            <div class="mockup">
                                <div class="screen" style="background-image: url('https://images.unsplash.com/photo-1511632765486-a01980e01a18?auto=format&amp;fit=crop&amp;q=80&amp;w=400');">
                                    <div class="screen-text">چت امن و سریع</div>
                                </div>
                            </div>
                            <div class="mockup">
                                <div class="screen" style="background-image: url('https://images.unsplash.com/photo-1522529599102-193c0d76b5b6?auto=format&amp;fit=crop&amp;q=80&amp;w=400');">
                                    <div class="screen-text">جستجوی پیشرفته</div>
                                </div>
                            </div>
                        </div>

                        <div class="faq-wrapper">
                            <div class="faq-box">
                                <div class="faq-title">❓🔤 چرا برنامه در گوگل پلی نیست؟</div>
                                <div class="faq-text">متاسفانه به دلیل تحریم‌های ناعادلانه گوگل علیه برنامه‌های ایرانی و مسدودسازی سرورهای داخلی ما، فعلا امکان انتشار نسخه اصلی در گوگل پلی وجود نداره و مجبوریم نسخه مستقیم رو براتون قرار بدیم.</div>
                            </div>
                            
                            <div class="faq-box">
                                <div class="faq-title">🔤 چرا تو کافه بازار یا مایکت نیست؟</div>
                                <div class="faq-text">همونطور که میدونید مارکت‌های داخلی اجازه انتشار برنامه‌های دوستیابی، صیغه‌یابی و چت آزاد رو نمیدن و قوانین سخت‌گیرانه‌ای دارن. به همین دلیل اپلیکیشن رو بدون واسطه در اختیارتون گذاشتیم.</div>
                            </div>
                            
                            <div class="faq-box">
                                <div class="faq-title">🤨🤝 آیا برنامه امن هست؟</div>
                                <div class="faq-text">بله، ۱۰۰٪. تمام اطلاعات و چت‌های شما رمزنگاری میشه و حریم خصوصی کاربران خط قرمز ماست.</div>
                            </div>
                        </div>

                    </div>
                </div>
            </body>
        </html>
    </foreignObject>
</svg>
